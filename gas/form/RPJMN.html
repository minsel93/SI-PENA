<div id="template-rpjmn" class="space-y-12">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <!-- Identitas Section -->
    <div class="col-span-1 md:col-span-2 bg-slate-50/50 dark:bg-slate-900/50 p-8 rounded-[2rem] border-2 border-themed grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="space-y-2">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 opacity-60">Periode Bulan</label>
        <select name="Bulan" required class="form-select rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-black appearance-none">
          <option value="">Pilih Bulan</option>
          <option value="Januari">Januari</option>
          <option value="Februari">Februari</option>
          <option value="Maret">Maret</option>
          <option value="April">April</option>
          <option value="Mei">Mei</option>
          <option value="Juni">Juni</option>
          <option value="Juli">Juli</option>
          <option value="Agustus">Agustus</option>
          <option value="September">September</option>
          <option value="Oktober">Oktober</option>
          <option value="November">November</option>
          <option value="Desember">Desember</option>
        </select>
      </div>
        <div class="space-y-2">
          <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Tahun</label>
          <input name="Tahun" type="number" required min="2020" max="2100" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-bold">
        </div>
        <div class="space-y-2">
          <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Puskesmas</label>
          <input name="Nama_Puskesmas" type="text" readonly class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-slate-100 dark:bg-slate-900 text-slate-400 text-sm font-bold">
        </div>
    </div>

    <!-- Sasaran Section -->
    <div class="col-span-1 md:col-span-2 bg-indigo-50/30 p-8 rounded-[2rem] border-2 border-indigo-100/50">
      <h3 class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em] mb-8 flex items-center gap-2">
        <i class="bi bi-people-fill"></i> Data Sasaran Wilayah
      </h3>
      <div class="grid grid-cols-1 sm:grid-cols-4 gap-6">
        <div class="space-y-2">
          <label class="block text-[10px] font-black text-slate-800 uppercase tracking-widest">Sasaran LH (Pusdatin)</label>
          <input name="Sasaran_Lahir_Hidup_Pusdatin" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-indigo-100 focus:border-indigo-500 transition-all text-sm font-black">
        </div>
        <div class="space-y-2">
          <label class="block text-[10px] font-black text-slate-800 uppercase tracking-widest">Sasaran Balita (SPM)</label>
          <input name="Sasaran_Balita_SPM_Kab_Minsel_0_4_Th" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-indigo-100 focus:border-indigo-500 transition-all text-sm font-black">
        </div>
        <div class="space-y-2">
          <label class="block text-[10px] font-black text-slate-800 uppercase tracking-widest">Sasaran Balita (Pusdatin)</label>
          <input name="Sasaran_Balita_Pusdatin" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-indigo-100 focus:border-indigo-500 transition-all text-sm font-black">
        </div>
        <div class="space-y-2">
          <label class="block text-[10px] font-black text-slate-800 uppercase tracking-widest">Jumlah Puskesmas</label>
          <input name="Jumlah_Puskesmas" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-indigo-100 focus:border-indigo-500 transition-all text-sm font-black">
        </div>
      </div>
    </div>

    <!-- Capaian Bayi & Balita -->
    <div class="col-span-1 border-r-2 border-slate-100 pr-8">
      <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-8 border-l-4 border-indigo-500 pl-4">Indikator Bayi & Balita</h3>
      <div class="space-y-8">
        <!-- KN Lengkap -->
        <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border-2 border-themed shadow-sm space-y-4">
          <div class="flex items-center justify-between">
            <h4 class="text-xs font-black uppercase tracking-widest text-slate-800 dark:text-slate-200">Pelayanan KN Lengkap</h4>
            <span class="text-indigo-500 bg-indigo-50 dark:bg-indigo-900/30 px-3 py-1 rounded-full text-[10px] font-black uppercase">Abs</span>
          </div>
          <input name="KN_Lengkap_Abs" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 text-lg font-black transition-all">
          <div class="flex items-center gap-2 bg-indigo-500 p-4 rounded-2xl text-white">
            <i class="bi bi-graph-up text-xl"></i>
            <div class="flex-grow">
              <label class="text-[8px] font-black uppercase tracking-widest opacity-70">Persentase Capaian</label>
              <input name="KN_Lengkap_Persen" type="number" step="0.01" readonly placeholder="0" class="w-full bg-transparent text-xl font-black outline-none border-none pointer-events-none">
            </div>
          </div>
        </div>

        <!-- Pantau Pertumbuhan -->
        <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border-2 border-themed shadow-sm space-y-4">
          <div class="flex items-center justify-between">
            <h4 class="text-xs font-black uppercase tracking-widest text-slate-800 dark:text-slate-200">Pantau Tumbuh Kembang</h4>
            <span class="text-indigo-500 bg-indigo-50 dark:bg-indigo-900/30 px-3 py-1 rounded-full text-[10px] font-black uppercase">Abs</span>
          </div>
          <input name="Balita_Dipantau_Tumbuh_Kembang_Abs" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 text-lg font-black transition-all">
          <div class="grid grid-cols-2 gap-4">
            <div class="bg-slate-50 p-4 rounded-2xl border-2 border-slate-100">
              <label class="text-[8px] font-black uppercase tracking-widest text-slate-400">SPM Kab (%)</label>
              <input name="Balita_Dipantau_Tumbuh_Kembang_Persen_SPM_Kab" type="number" step="0.01" readonly placeholder="0" class="w-full bg-transparent text-xl font-black text-indigo-600 outline-none border-none pointer-events-none text-right">
            </div>
            <div class="bg-slate-50 p-4 rounded-2xl border-2 border-slate-100">
              <label class="text-[8px] font-black uppercase tracking-widest text-slate-400">Pusdatin (%)</label>
              <input name="Balita_Dipantau_Tumbuh_Kembang_Persen_Pusdatin" type="number" step="0.01" readonly placeholder="0" class="w-full bg-transparent text-xl font-black text-indigo-600 outline-none border-none pointer-events-none text-right">
            </div>
          </div>
        </div>

        <!-- Balita Berobat -->
        <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border-2 border-themed shadow-sm space-y-4">
          <div class="flex items-center justify-between">
            <h4 class="text-xs font-black uppercase tracking-widest text-slate-800 dark:text-slate-200">Jumlah Balita Berobat</h4>
            <span class="text-indigo-500 bg-indigo-50 dark:bg-indigo-900/30 px-3 py-1 rounded-full text-[10px] font-black uppercase">Abs</span>
          </div>
          <input name="Jumlah_Balita_Berobat_Abs" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 text-lg font-black transition-all">
          <div class="grid grid-cols-2 gap-4">
            <div class="bg-slate-50 p-4 rounded-2xl border-2 border-slate-100">
              <label class="text-[8px] font-black uppercase tracking-widest text-slate-400">Pusdatin (%)</label>
              <input name="Jumlah_Balita_Berobat_Persen_Pusdatin" type="number" step="0.01" readonly class="w-full bg-transparent text-xl font-black text-indigo-600 outline-none border-none pointer-events-none">
            </div>
            <div class="bg-slate-50 p-4 rounded-2xl border-2 border-slate-100">
              <label class="text-[8px] font-black uppercase tracking-widest text-slate-400">SPM Kab (%)</label>
              <input name="Jumlah_Balita_Berobat_Persen_SPM_Kab" type="number" step="0.01" readonly class="w-full bg-transparent text-xl font-black text-indigo-600 outline-none border-none pointer-events-none">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Integrasi Layanan -->
    <div class="col-span-1">
      <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-8 border-l-4 border-emerald-500 pl-4">Integrasi Layanan & MTBS</h3>
      <div class="space-y-8">
        <!-- MTBS SECTION -->
        <div class="bg-slate-900 p-8 rounded-[2rem] text-white shadow-xl relative overflow-hidden">
          <div class="absolute -right-4 -bottom-4 text-white/5 text-9xl">
            <i class="bi bi-shield-plus"></i>
          </div>
          <h4 class="text-xs font-black uppercase tracking-widest text-emerald-400 mb-6 flex items-center gap-2">
            <i class="bi bi-activity"></i> Implementasi MTBS
          </h4>
          <div class="space-y-6 relative z-10">
            <div class="grid grid-cols-2 gap-4">
              <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                <label class="text-[8px] font-black uppercase tracking-widest text-white/50">Balita MTBS (Abs)</label>
                <input name="Jumlah_Balita_MTBS_Abs" type="number" required min="0" placeholder="0" class="w-full bg-transparent text-2xl font-black text-white outline-none">
              </div>
              <div class="bg-emerald-500 p-4 rounded-2xl shadow-lg shadow-emerald-900/40">
                <label class="text-[8px] font-black uppercase tracking-widest text-emerald-100">MTBS / Pusdatin (%)</label>
                <input name="Jumlah_Balita_MTBS_Persen_Pusdatin" type="number" readonly placeholder="0" class="w-full bg-transparent text-2xl font-black text-white outline-none border-none pointer-events-none shadow-none">
              </div>
              <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                <label class="text-[8px] font-black uppercase tracking-widest text-white/50">MTBS / SPM (%)</label>
                <input name="Jumlah_Balita_MTBS_Persen_SPM_Kab" type="number" readonly placeholder="0" class="w-full bg-transparent text-2xl font-black text-white outline-none border-none pointer-events-none shadow-none">
              </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                <label class="text-[8px] font-black uppercase tracking-widest text-white/50">PKM MTBS (Abs)</label>
                <input name="Puskesmas_Melaksanakan_MTBS_Abs" type="number" required min="0" placeholder="0" class="w-full bg-transparent text-2xl font-black text-white outline-none">
              </div>
              <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                <label class="text-[8px] font-black uppercase tracking-widest text-white/50">PKM MTBS (%)</label>
                <input name="Puskesmas_Melaksanakan_MTBS_Persen" type="number" readonly placeholder="0" class="w-full bg-transparent text-2xl font-black text-white outline-none">
              </div>
            </div>
          </div>
        </div>

        <!-- SDIDTK SECTION -->
        <div class="bg-indigo-50 dark:bg-indigo-900/20 p-8 rounded-[2rem] border-2 border-themed">
          <h4 class="text-xs font-black uppercase tracking-widest text-indigo-400 mb-6 flex items-center gap-2">
            <i class="bi bi-clipboard-pulse"></i> Cakupan SDIDTK
          </h4>
          <div class="grid grid-cols-1 gap-6">
            <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border-2 border-themed shadow-sm space-y-4">
              <div class="flex items-center justify-between">
                <div>
                  <label class="text-[8px] font-black uppercase tracking-widest text-indigo-300">Balita SDIDTK (Abs)</label>
                  <input name="Jumlah_Balita_SDIDTK_Abs" type="number" required min="0" class="w-full bg-transparent text-2xl font-black text-slate-800 outline-none">
                </div>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div class="bg-indigo-100 p-3 rounded-xl">
                  <label class="text-[8px] font-black uppercase tracking-widest text-indigo-400">Pusdatin (%)</label>
                  <input name="Jumlah_Balita_SDIDTK_Persen_Pusdatin" type="number" readonly class="w-full bg-transparent text-lg font-black text-indigo-700 outline-none">
                </div>
                <div class="bg-indigo-100 p-3 rounded-xl">
                  <label class="text-[8px] font-black uppercase tracking-widest text-indigo-400">SPM (%)</label>
                  <input name="Jumlah_Balita_SDIDTK_Persen_SPM_Kab" type="number" readonly class="w-full bg-transparent text-lg font-black text-indigo-700 outline-none">
                </div>
              </div>
            </div>
            <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border-2 border-themed shadow-sm grid grid-cols-2 gap-4">
              <div>
                <label class="text-[8px] font-black uppercase tracking-widest text-indigo-300">PKM SDIDTK (Abs)</label>
                <input name="Puskesmas_Melaksanakan_SDIDTK_Abs" type="number" required min="0" class="w-full bg-transparent text-2xl font-black text-slate-800 outline-none">
              </div>
              <div>
                <label class="text-[8px] font-black uppercase tracking-widest text-indigo-300">PKM SDIDTK (%)</label>
                <input name="Puskesmas_Melaksanakan_SDIDTK_Persen" type="number" readonly class="w-full bg-transparent text-2xl font-black text-slate-800 outline-none">
              </div>
            </div>
          </div>
        </div>

        <!-- Kelas Ibu Balita SECTION -->
        <div class="bg-slate-50 dark:bg-slate-900/50 p-8 rounded-[2rem] border-2 border-themed">
           <h4 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-6 flex items-center gap-2">
            <i class="bi bi-people"></i> Kelas Ibu Balita
          </h4>
          <div class="grid grid-cols-1 gap-4">
            <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border border-themed">
              <label class="text-[8px] font-black uppercase tracking-widest text-slate-400">PKM Laks Kelas Ibu (Abs)</label>
              <input name="Puskesmas_Kelas_Ibu_Balita_50_Persen_Desa_Abs" type="number" required min="0" placeholder="0" class="w-full bg-transparent text-2xl font-black text-slate-800 dark:text-slate-100 outline-none">
            </div>
            <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl border border-themed">
              <label class="text-[8px] font-black uppercase tracking-widest text-slate-400">PKM Laks Kelas Ibu (%)</label>
              <input name="Puskesmas_Kelas_Ibu_Balita_50_Persen_Desa_Persen" type="number" readonly placeholder="0" class="w-full bg-transparent text-2xl font-black text-slate-800 dark:text-slate-100 outline-none">
            </div>
          </div>
        </div>

        <!-- Penyelenggaraan YanKes Section -->
        <div class="bg-emerald-50 dark:bg-emerald-900/20 p-8 rounded-[2rem] border-2 border-themed">
          <h4 class="text-xs font-black uppercase tracking-widest text-emerald-400 mb-6">Penyelenggaraan YanKes</h4>
          <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="space-y-1">
              <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ya</label>
              <input name="Kab_Kota_Menyelenggarakan_Pelayanan_Kesehatan_Balita_Ya" type="number" required min="0" placeholder="0" class="form-control rounded-xl py-3 px-4 w-full bg-white dark:bg-slate-800 border-2 border-emerald-200 dark:border-emerald-900 text-sm font-bold">
            </div>
            <div class="space-y-1">
              <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Tidak</label>
              <input name="Kab_Kota_Menyelenggarakan_Pelayanan_Kesehatan_Balita_Tidak" type="number" required min="0" placeholder="0" class="form-control rounded-xl py-3 px-4 w-full bg-white dark:bg-slate-800 border-2 border-emerald-200 dark:border-emerald-900 text-sm font-bold">
            </div>
          </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
