<div id="template-kelasBalitaKabKota" class="space-y-12">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <!-- Identitas Section -->
    <div class="col-span-1 md:col-span-2 bg-slate-50/50 dark:bg-slate-900/50 p-8 rounded-[2rem] border-2 border-slate-100 dark:border-slate-800 grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="space-y-2">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 opacity-60 leading-none">Periode Bulan</label>
        <select name="Bulan" required class="form-select rounded-2xl py-3.5 px-4 w-full border-2 border-themed bg-white dark:bg-slate-800 focus:border-cyan-500 transition-all text-sm font-black appearance-none">
          <option value="">Pilih Bulan</option>
          <option value="Januari">Januari</option>
          <option value="Februari">Februari</option>
          <option value="Maret">Maret</option>
          <option value="April">April</option>
          <option value="Mei">Mei</option>
          <option value="Juni">Juni</option>
          <option value="Juli">Juli</option>
          <option value="Agustus">Agustus</option>
          <option value="September">September</option>
          <option value="Oktober">Oktober</option>
          <option value="November">November</option>
          <option value="Desember">Desember</option>
        </select>
      </div>
      <div class="space-y-2">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 opacity-60 leading-none">Tahun</label>
        <input name="Tahun" type="number" required min="2020" max="2100" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed bg-white dark:bg-slate-800 focus:border-cyan-500 transition-all text-sm font-bold">
      </div>
      <div class="space-y-2">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 opacity-60 leading-none">Puskesmas</label>
        <input name="Nama_Puskesmas" type="text" readonly class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed bg-slate-50 dark:bg-slate-900 text-slate-400 text-sm font-bold">
      </div>
    </div>

    <!-- Data Indikator Section -->
    <div class="col-span-1 md:col-span-2 bg-cyan-50/30 dark:bg-cyan-900/10 p-10 rounded-[3rem] border-2 border-cyan-100 dark:border-cyan-900/30 grid grid-cols-1 md:grid-cols-2 gap-10">
      <div class="space-y-6">
        <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border-2 border-themed shadow-sm">
          <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 block leading-none">Jumlah Puskesmas</label>
          <input name="Jumlah_Puskesmas" type="number" required min="0" placeholder="0" class="w-full bg-transparent text-4xl font-black text-slate-800 dark:text-white outline-none">
        </div>
        <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border-2 border-themed shadow-sm">
          <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 block leading-none">Jumlah Desa/Kelurahan</label>
          <input name="Jumlah_Desa_Kelurahan" type="number" required min="1" placeholder="0" class="w-full bg-transparent text-4xl font-black text-slate-800 dark:text-white outline-none">
        </div>
        <div class="bg-indigo-600 p-8 rounded-3xl text-white shadow-xl">
           <label class="text-[10px] font-black uppercase tracking-widest opacity-70 mb-4 block leading-none">Desa Laksana Kelas Ibu Balita (Abs)</label>
           <input name="Desa_Dengan_Kelas_Ibu_Balita_Abs" type="number" required min="0" placeholder="0" class="w-full bg-transparent text-5xl font-black text-white outline-none border-none">
           <div class="mt-4 pt-4 border-t border-white/10 flex justify-between items-center">
              <span class="text-[10px] font-black uppercase tracking-widest opacity-70">Persentase Capaian</span>
              <div class="flex items-baseline gap-1">
                <input name="Desa_Dengan_Kelas_Ibu_Balita_Persen" type="number" step="0.01" readonly placeholder="0" class="bg-transparent text-2xl font-black text-emerald-300 w-24 text-right outline-none">
                <span class="text-emerald-300 font-black">%</span>
              </div>
           </div>
        </div>
      </div>
      
      <div class="space-y-6">
        <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border-2 border-themed shadow-sm">
          <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 block leading-none">Jumlah Kelas Ibu Balita</label>
          <input name="Jumlah_Kelas_Ibu_Balita" type="number" required min="0" placeholder="0" class="w-full bg-transparent text-4xl font-black text-slate-800 dark:text-white outline-none">
        </div>
        <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border-2 border-themed shadow-sm">
          <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 block leading-none">Jumlah Ibu Mengikuti Kelas</label>
          <input name="Jumlah_Ibu_Mengikuti_Kelas_Ibu_Balita" type="number" required min="0" placeholder="0" class="w-full bg-transparent text-4xl font-black text-slate-800 dark:text-white outline-none">
        </div>
        
        <div class="bg-cyan-900 p-8 rounded-3xl text-white shadow-xl relative overflow-hidden">
           <div class="absolute -right-4 -bottom-4 text-white/5 text-8xl"><i class="bi bi-building-check"></i></div>
           <label class="text-[10px] font-black uppercase tracking-widest opacity-70 mb-4 block leading-none">Puskesmas Laksana di >= 50% Desa</label>
           <input name="Puskesmas_Melaksanakan_Kelas_Ibu_Balita_di_50_Persen_Desa_Kelurahan" type="number" required min="0" placeholder="0" class="w-full bg-transparent text-4xl font-black text-white outline-none border-none relative z-10">
           <div class="mt-4 pt-4 border-t border-white/10 flex justify-between items-center relative z-10">
              <span class="text-[10px] font-black uppercase tracking-widest opacity-70">Persentase PKM</span>
              <div class="flex items-baseline gap-1">
                <input name="Persen_Desa_Melaksanakan_KLS_Ibu_Balita" type="number" step="0.01" readonly placeholder="0" class="bg-transparent text-2xl font-black text-cyan-300 w-24 text-right outline-none">
                <span class="text-cyan-300 font-black">%</span>
              </div>
           </div>
        </div>
      </div>
    </div>
  </div>
</div>
