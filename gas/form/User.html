<div id="template-users">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="col-span-1 md:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
      <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-4 border-b pb-2">Manajemen User</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-1">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-500">Username</label>
          <input name="username" type="text" required class="form-control rounded-xl p-3 w-full border-2 border-slate-200">
        </div>
        <div class="space-y-1">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-500">Password</label>
          <input name="password" type="password" required class="form-control rounded-xl p-3 w-full border-2 border-slate-200">
        </div>
        <div class="space-y-1">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-500">Role</label>
          <select name="role" required class="form-select rounded-xl p-3 w-full border-2 border-slate-200">
            <option value="puskesmas">Puskesmas</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="space-y-1">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-500">ID Puskesmas</label>
          <input name="puskesmasId" type="text" class="form-control rounded-xl p-3 w-full border-2 border-slate-200">
        </div>
        <div class="space-y-1">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-500">Nama Puskesmas</label>
          <input name="puskesmasName" type="text" class="form-control rounded-xl p-3 w-full border-2 border-slate-200">
        </div>
      </div>
    </div>
  </div>
</div>
