<div id="template-users" class="space-y-8">
  <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] border-2 border-themed shadow-sm relative overflow-hidden">
    <div class="absolute top-0 right-0 p-8 opacity-5 text-6xl text-slate-400">
      <i class="bi bi-shield-lock-fill"></i>
    </div>
    
    <div class="mb-10">
      <h3 class="text-xl font-black text-slate-900 dark:text-slate-100 mb-2">Manajemen Identitas User</h3>
      <p class="text-sm text-slate-500 font-medium">Konfigurasi akun dan hak akses pengguna sistem.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-8">
      <div class="space-y-2">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400">Username Login</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
            <i class="bi bi-person-fill"></i>
          </span>
          <input name="Username" type="text" required class="form-control rounded-2xl py-3.5 pl-11 pr-4 w-full border-2 border-themed dark:border-slate-700 focus:border-emerald-500 transition-all text-sm font-bold bg-slate-50/30 dark:bg-slate-900/50 text-slate-800 dark:text-slate-100">
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400">Wilayah Puskesmas (Kode)</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
            <i class="bi bi-hash"></i>
          </span>
          <input name="Wilayah_Puskesmas" type="text" placeholder="0" class="form-control rounded-2xl py-3.5 pl-11 pr-4 w-full border-2 border-themed dark:border-slate-700 focus:border-emerald-500 transition-all text-sm font-bold bg-slate-50/30 dark:bg-slate-900/50 text-slate-800 dark:text-slate-100">
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400">Status Akun</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
            <i class="bi bi-toggle-on"></i>
          </span>
          <select name="Status" required class="form-select rounded-2xl py-3.5 pl-11 pr-4 w-full border-2 border-themed dark:border-slate-700 focus:border-emerald-500 transition-all text-sm font-black appearance-none bg-slate-50/30 dark:bg-slate-900/50 text-slate-800 dark:text-slate-100">
            <option value="Aktif">Aktif</option>
            <option value="Non-Aktif">Non-Aktif</option>
          </select>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400">Password</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
            <i class="bi bi-key-fill"></i>
          </span>
          <input name="Password" type="password" required class="form-control rounded-2xl py-3.5 pl-11 pr-4 w-full border-2 border-themed dark:border-slate-700 focus:border-emerald-500 transition-all text-sm font-bold bg-slate-50/30 dark:bg-slate-900/50 text-slate-800 dark:text-slate-100">
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400">Role Akses</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
            <i class="bi bi-person-badge-fill"></i>
          </span>
          <select name="Role" required class="form-select rounded-2xl py-3.5 pl-11 pr-4 w-full border-2 border-themed dark:border-slate-700 focus:border-emerald-500 transition-all text-sm font-black appearance-none bg-slate-50/30 dark:bg-slate-900/50 text-slate-800 dark:text-slate-100">
            <option value="user">User (Puskesmas)</option>
            <option value="admin">Administrator</option>
          </select>
        </div>
      </div>

      <div class="space-y-2 md:col-span-2">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400">Nama Puskesmas</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
            <i class="bi bi-building"></i>
          </span>
          <input name="Nama_Puskesmas" type="text" required class="form-control rounded-2xl py-4 pl-12 pr-4 w-full border-2 border-themed dark:border-slate-700 focus:border-emerald-500 transition-all text-lg font-black bg-slate-50/30 dark:bg-slate-900/50 text-slate-800 dark:text-slate-100">
        </div>
      </div>
    </div>
  </div>
  </div>
</div>
