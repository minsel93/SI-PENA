<div id="template-kematianNeonatal" class="space-y-12">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <!-- Identitas Section -->
    <div class="col-span-1 md:col-span-2 bg-slate-50/50 dark:bg-slate-900/50 p-8 rounded-[2rem] border-2 border-slate-100 dark:border-slate-800 grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="space-y-2">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 opacity-60 leading-none">Periode Bulan</label>
        <select name="Bulan" required class="form-select rounded-2xl py-3.5 px-4 w-full border-2 border-themed bg-white dark:bg-slate-800 focus:border-rose-500 transition-all text-sm font-black appearance-none">
          <option value="">Pilih Bulan</option>
          <option value="Januari">Januari</option>
          <option value="Februari">Februari</option>
          <option value="Maret">Maret</option>
          <option value="April">April</option>
          <option value="Mei">Mei</option>
          <option value="Juni">Juni</option>
          <option value="Juli">Juli</option>
          <option value="Agustus">Agustus</option>
          <option value="September">September</option>
          <option value="Oktober">Oktober</option>
          <option value="November">November</option>
          <option value="Desember">Desember</option>
        </select>
      </div>
      <div class="space-y-2">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 opacity-60 leading-none">Tahun</label>
        <input name="Tahun" type="number" required min="2020" max="2100" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed bg-white dark:bg-slate-800 focus:border-rose-500 transition-all text-sm font-bold">
      </div>
      <div class="space-y-2">
        <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 opacity-60 leading-none">Puskesmas</label>
        <input name="Nama_Puskesmas" type="text" readonly class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed bg-slate-50 dark:bg-slate-900 text-slate-400 text-sm font-bold">
      </div>
    </div>

    <!-- Data Kelahiran -->
    <div class="bg-indigo-50/30 dark:bg-indigo-900/10 p-8 rounded-[3rem] border-2 border-indigo-100 dark:border-indigo-900/30">
      <h3 class="text-xs font-black text-indigo-500 uppercase tracking-widest mb-8 flex items-center gap-2">
        <i class="bi bi-star-fill"></i> INFORMASI KELAHIRAN
      </h3>
      <div class="space-y-8">
        <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border-2 border-themed shadow-sm">
           <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 block">Lahir Hidup (Absolut)</label>
           <div class="grid grid-cols-2 gap-4">
              <div class="space-y-2">
                <label class="text-[8px] font-black text-slate-500 uppercase">Laki-Laki</label>
                <input name="Lahir_Hidup_Absolut_L" type="number" required min="0" placeholder="0" class="w-full bg-slate-50 dark:bg-slate-900 rounded-xl py-3 px-4 text-xl font-black text-slate-800 dark:text-white outline-none border-2 border-slate-100 dark:border-slate-700 focus:border-indigo-500">
              </div>
              <div class="space-y-2">
                <label class="text-[8px] font-black text-slate-500 uppercase">Perempuan</label>
                <input name="Lahir_Hidup_Absolut_P" type="number" required min="0" placeholder="0" class="w-full bg-slate-50 dark:bg-slate-900 rounded-xl py-3 px-4 text-xl font-black text-slate-800 dark:text-white outline-none border-2 border-slate-100 dark:border-slate-700 focus:border-indigo-500">
              </div>
           </div>
           <div class="mt-4 pt-4 border-t-2 border-indigo-50 dark:border-indigo-900 flex justify-between items-center">
              <span class="text-[10px] font-black uppercase text-indigo-400">Total Lahir Hidup</span>
              <input name="Lahir_Hidup_Total" type="number" readonly placeholder="0" class="bg-transparent text-2xl font-black text-indigo-600 dark:text-indigo-400 w-24 text-right outline-none">
           </div>
        </div>

        <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border-2 border-themed shadow-sm">
           <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 block">Lahir Mati</label>
           <input name="Jml_Bayi_Lahir_Mati" type="number" required min="0" placeholder="0" class="w-full bg-slate-50 dark:bg-slate-900 rounded-xl py-4 px-6 text-3xl font-black text-slate-800 dark:text-white outline-none border-2 border-slate-100 dark:border-slate-700 focus:border-rose-500">
        </div>
      </div>
    </div>

    <!-- Data Kematian & Sebab -->
    <div class="bg-rose-50/30 dark:bg-rose-900/10 p-8 rounded-[3rem] border-2 border-rose-100 dark:border-rose-900/30 space-y-8">
      <div>
        <h3 class="text-xs font-black text-rose-500 uppercase tracking-widest mb-8 flex items-center gap-2">
          <i class="bi bi-exclamation-triangle-fill"></i> KEMATIAN NEONATAL
        </h3>
        <div class="grid grid-cols-2 gap-4">
          <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border-2 border-themed shadow-sm">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 leading-none">0 - 6 Hari</label>
            <input name="Kematian_0_6_Hari" type="number" required min="0" placeholder="0" class="w-full bg-transparent text-2xl font-black text-rose-600 outline-none">
          </div>
          <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border-2 border-themed shadow-sm">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2 leading-none">7 - 28 Hari</label>
            <input name="Kematian_7_28_Hari" type="number" required min="0" placeholder="0" class="w-full bg-transparent text-2xl font-black text-rose-600 outline-none">
          </div>
        </div>
        <div class="mt-4 bg-rose-600 text-white p-6 rounded-3xl shadow-xl flex justify-between items-center">
          <span class="text-xs font-black uppercase tracking-widest">Total Kematian</span>
          <input name="Jumlah_Kematian_Neonatal" type="number" readonly placeholder="0" class="bg-transparent text-4xl font-black text-white w-24 text-right outline-none">
        </div>
      </div>

      <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] border-2 border-themed shadow-sm">
        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 block border-b-2 border-slate-50 pb-4 leading-none">Penyebab Kematian</label>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <div class="space-y-1">
            <label class="text-[9px] font-black uppercase text-slate-500">Sebab BBLR</label>
            <input name="Sebab_BBLR" type="number" required min="0" placeholder="0" class="w-full bg-slate-50 dark:bg-slate-900 rounded-xl py-3 px-4 font-black border-none outline-none">
          </div>
          <div class="space-y-1">
            <label class="text-[9px] font-black uppercase text-slate-500">Sebab Asfiksia</label>
            <input name="Sebab_Asfiksia" type="number" required min="0" placeholder="0" class="w-full bg-slate-50 dark:bg-slate-900 rounded-xl py-3 px-4 font-black border-none outline-none">
          </div>
          <div class="space-y-1">
            <label class="text-[9px] font-black uppercase text-slate-500">Sebab Tetanus</label>
            <input name="Sebab_Tetanus_Neonatrum" type="number" required min="0" placeholder="0" class="w-full bg-slate-50 dark:bg-slate-900 rounded-xl py-3 px-4 font-black border-none outline-none">
          </div>
          <div class="space-y-1">
            <label class="text-[9px] font-black uppercase text-slate-500">Sebab Infeksi</label>
            <input name="Sebab_Infeksi" type="number" required min="0" placeholder="0" class="w-full bg-slate-50 dark:bg-slate-900 rounded-xl py-3 px-4 font-black border-none outline-none">
          </div>
          <div class="space-y-1">
            <label class="text-[9px] font-black uppercase text-slate-500">Sebab Kongenital</label>
            <input name="Sebab_Kelainan_Kongenital" type="number" required min="0" placeholder="0" class="w-full bg-slate-50 dark:bg-slate-900 rounded-xl py-3 px-4 font-black border-none outline-none">
          </div>
          <div class="space-y-1">
            <label class="text-[9px] font-black uppercase text-slate-500">Sebab COVID-19</label>
            <input name="Sebab_COVID_19" type="number" required min="0" placeholder="0" class="w-full bg-slate-50 dark:bg-slate-900 rounded-xl py-3 px-4 font-black border-none outline-none">
          </div>
          <div class="space-y-1 sm:col-span-2">
            <label class="text-[9px] font-black uppercase text-slate-500">Sebab Lain-Lain</label>
            <input name="Sebab_Lain_Lain" type="number" required min="0" placeholder="0" class="w-full bg-slate-50 dark:bg-slate-900 rounded-xl py-3 px-4 font-black border-none outline-none">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
