<div id="template-sasaran" class="space-y-8">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <!-- Identitas Section -->
    <div class="col-span-1 md:col-span-2 bg-slate-50/50 p-8 rounded-[2rem] border-2 border-themed">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center text-lg">
          <i class="bi bi-info-circle-fill"></i>
        </div>
        <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">Informasi Dasar Laporan</h3>
      </div>
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 leading-none">Pilih Bulan</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-600">
              <i class="bi bi-calendar-event"></i>
            </div>
            <select name="Bulan" required class="form-select rounded-2xl py-3.5 pl-11 pr-4 w-full border-2 border-themed bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-black appearance-none">
              <option value="">Pilih Bulan</option>
              <option value="Januari">Januari</option>
              <option value="Februari">Februari</option>
              <option value="Maret">Maret</option>
              <option value="April">April</option>
              <option value="Mei">Mei</option>
              <option value="Juni">Juni</option>
              <option value="Juli">Juli</option>
              <option value="Agustus">Agustus</option>
              <option value="September">September</option>
              <option value="Oktober">Oktober</option>
              <option value="November">November</option>
              <option value="Desember">Desember</option>
            </select>
          </div>
        </div>
        
        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 leading-none">Tahun Anggaran</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-600">
              <i class="bi bi-calendar3"></i>
            </div>
            <input name="Tahun" type="number" required min="2020" max="2050" placeholder="0" class="form-control rounded-2xl py-3.5 pl-11 pr-4 w-full border-2 border-themed bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-bold">
          </div>
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 leading-none">Unit Puskesmas</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
              <i class="bi bi-house-door"></i>
            </div>
            <input name="Nama_Puskesmas" type="text" required readonly class="form-control rounded-2xl py-3.5 pl-11 pr-4 w-full border-2 border-themed bg-slate-50 dark:bg-slate-900 text-slate-500 text-sm font-bold">
          </div>
        </div>
      </div>
    </div>

    <!-- Data Sasaran Section -->
    <div class="col-span-1 md:col-span-2 bg-white dark:bg-slate-800/50 p-8 rounded-[2rem] border-2 border-themed shadow-sm">
      <div class="flex items-center gap-3 mb-8">
        <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center text-lg">
          <i class="bi bi-bar-chart-fill"></i>
        </div>
        <div>
          <h3 class="text-xs font-black text-slate-800 uppercase tracking-[0.2em]">Target & Sasaran Indikator</h3>
          <p class="text-[10px] text-slate-400 font-bold">Masukkan jumlah sasaran riil sesuai data Pusdatin/SPM</p>
        </div>
      </div>
      
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 leading-none">Lahir Hidup (Pusdatin)</label>
          <input name="Sasaran_Lahir_Hidup_Pusdatin" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-bold">
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 leading-none">0 Tahun (Surviving Infant)</label>
          <input name="Sasaran_0_Tahun_Surviving_Infant" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-bold">
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 leading-none">Usia 0-4 Tahun</label>
          <input name="Sasaran_0_4_Tahun" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-bold">
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 leading-none">Usia 1-4 Tahun</label>
          <input name="Sasaran_1_4_Tahun" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-bold">
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 leading-none">Pra Sekolah (5-6 Th)</label>
          <input name="Sasaran_Anak_Pra_Sekolah_5_6_Th" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-bold">
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 leading-none">Jumlah TK</label>
          <input name="Jumlah_TK" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-bold">
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 leading-none">Jumlah SD/MI</label>
          <input name="Jumlah_SD_MI" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-bold">
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 leading-none">Jumlah SMP/MTS</label>
          <input name="Jumlah_SMP_MTs" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-bold">
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 leading-none">Jumlah SMU/SMK/MA</label>
          <input name="Jumlah_SMU_SMK_MA" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-bold">
        </div>

        <div class="space-y-2 bg-indigo-50/50 dark:bg-indigo-900/20 p-4 rounded-2xl border border-indigo-100 dark:border-indigo-900/50">
          <label class="block text-[10px] font-black uppercase tracking-widest text-indigo-400 dark:text-indigo-600 leading-none">Peserta Didik KLS 1</label>
          <input name="Jumlah_Peserta_Didik_Kelas_1" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-white dark:border-slate-700 focus:border-indigo-500 transition-all text-sm font-black bg-white dark:bg-slate-800">
        </div>

        <div class="space-y-2 bg-indigo-50/50 dark:bg-indigo-900/20 p-4 rounded-2xl border border-indigo-100 dark:border-indigo-900/50">
          <label class="block text-[10px] font-black uppercase tracking-widest text-indigo-400 dark:text-indigo-600 leading-none">Peserta Didik KLS 7</label>
          <input name="Jumlah_Peserta_Didik_Kelas_7" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-white dark:border-slate-700 focus:border-indigo-500 transition-all text-sm font-black bg-white dark:bg-slate-800">
        </div>

        <div class="space-y-2 bg-indigo-50/50 dark:bg-indigo-900/20 p-4 rounded-2xl border border-indigo-100 dark:border-indigo-900/50">
          <label class="block text-[10px] font-black uppercase tracking-widest text-indigo-400 dark:text-indigo-600 leading-none">Peserta Didik KLS 10</label>
          <input name="Jumlah_Peserta_Didik_Kelas_10" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-white dark:border-slate-700 focus:border-indigo-500 transition-all text-sm font-black bg-white dark:bg-slate-800">
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 leading-none">Jumlah Puskesmas</label>
          <input name="Jumlah_Puskesmas" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-bold">
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 leading-none">Jumlah Panti/LKSA</label>
          <input name="Jumlah_Panti_LKSA_Sasaran" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-bold">
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 leading-none">SLB Sasaran</label>
          <input name="SLB_Sasaran" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-bold">
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 leading-none">Lapas/Rutan Anak</label>
          <input name="Jumlah_Lapas_Rutan_Anak_Sasaran" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-bold">
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 leading-none">RS Memiliki PPT/PKT</label>
          <input name="Jumlah_RS_Memiliki_PPT_PKT" type="number" required min="0" placeholder="0" class="form-control rounded-2xl py-3.5 px-4 w-full border-2 border-themed dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 transition-all text-sm font-bold">
        </div>

      </div>
    </div>
  </div>
</div>
