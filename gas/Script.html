<script>
  // Global State
  let appState = {
    currentUser: null,
    isAdmin: false,
    records: null, // Changed from {} to null to distinguish between "not loaded" and "empty"
    currentView: 'dashboard',
    editingData: null,
    sliderInterval: null,
    clockInterval: null,
    charts: { pie: null, bar: null, line: null }
  };

  const FORMS = [
    { id: 'sasaran', label: 'Sasaran', icon: '<i class="bi bi-bullseye"></i>', color: 'bg-indigo-600', desc: 'Dataset sasaran indikator utama kesehatan anak' },
    { id: 'kegiatan', label: 'Laporan Kegiatan', icon: '<i class="bi bi-clipboard-pulse"></i>', color: 'bg-emerald-600', desc: 'Pelayanan kesehatan neonatal, bayi, dan balita' },
    { id: 'rpjmn', label: 'RPJMN', icon: '<i class="bi bi-graph-up-arrow"></i>', color: 'bg-blue-600', desc: 'Pemantauan perkembangan dan target RPJMN' },
    { id: 'kelasBalita', label: 'Kelas Balita', icon: '<i class="bi bi-people-fill"></i>', color: 'bg-amber-600', desc: 'Pencatatan partisipasi kelas ibu balita' },
    { id: 'kelasBalitaKabKota', label: 'Kelas Balita Kab/Kota', icon: '<i class="bi bi-building-check"></i>', color: 'bg-purple-600', desc: 'Statistik pelaksanaan kelas balita per wilayah' },
    { id: 'kematianNeonatal', label: 'Kematian Neonatal', icon: '<i class="bi bi-virus"></i>', color: 'bg-rose-600', desc: 'Data kematian bayi usia 0-28 hari' },
    { id: 'kematianBalita', label: 'Kematian Balita', icon: '<i class="bi bi-activity"></i>', color: 'bg-orange-600', desc: 'Data kematian anak balita usia 0-59 bulan' },
    { id: 'users', label: 'Manajemen User', icon: '<i class="bi bi-person-lock"></i>', color: 'bg-slate-800', desc: 'Pengaturan hak akses dan akun puskesmas' }
  ];

  const FORM_DEFINITIONS = FORMS.reduce((acc, form) => {
    acc[form.id] = form;
    return acc;
  }, {});

  const MONTH_NAMES = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

  // Initialization
  window.onerror = function(msg, url, lineNo, columnNo, error) {
    console.error('Global Error:', msg, 'at', lineNo, ':', columnNo, error);
    if (typeof showNotification === 'function') {
      showNotification('Terjadi kesalahan sistem: ' + msg, true);
    }
    return false;
  };

  document.addEventListener('DOMContentLoaded', () => {
    console.log('SI-PENA: DOMContentLoaded fired');
    try {
      loadTheme();
      const savedUser = localStorage.getItem('sipena_user');
      console.log('SI-PENA: User session check:', savedUser ? 'Found' : 'Not found');
      
      if (savedUser && savedUser !== 'undefined' && savedUser !== 'null') {
        const user = JSON.parse(savedUser);
        if (user && user.username) {
          appState.currentUser = user;
          appState.isAdmin = user.role === 'admin';
          showMainApp();
        } else {
          showLogin();
        }
      } else {
        showLogin();
      }
    } catch (e) {
      console.error('SI-PENA Boot Error:', e);
      localStorage.removeItem('sipena_user');
      showLogin();
    }
  });

  // UI Helpers
  function loadTheme() {
    const theme = localStorage.getItem('sipena_theme') || 'light';
    if (theme === 'dark') {
      document.documentElement.classList.add('dark');
      updateThemeIcons(true);
    } else {
      document.documentElement.classList.remove('dark');
      updateThemeIcons(false);
    }
  }

  function toggleTheme() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('sipena_theme', isDark ? 'dark' : 'light');
    updateThemeIcons(isDark);
  }

  function updateThemeIcons(isDark) {
    const icon = document.getElementById('theme-icon');
    const mobileIcon = document.getElementById('theme-icon-mobile');
    const classStr = isDark ? 'bi bi-sun-fill text-yellow-400' : 'bi bi-moon-stars';
    
    if (icon) icon.className = classStr + ' text-lg group-hover:scale-110 transition-transform';
    if (mobileIcon) mobileIcon.className = classStr + ' text-xl';
  }

  function showLogin() {
    console.log('SI-PENA: Switching to login screen');
    const loginScreen = document.getElementById('login-screen');
    const mainApp = document.getElementById('main-app');
    const loading = document.getElementById('loading-overlay');
    
    if (loading) loading.classList.add('hidden');
    if (mainApp) {
      mainApp.classList.add('hidden');
      mainApp.style.display = 'none';
    }
    if (loginScreen) {
      loginScreen.classList.remove('hidden');
      loginScreen.style.display = 'flex';
      loginScreen.style.zIndex = '100';
      loginScreen.style.opacity = '1';
      loginScreen.style.visibility = 'visible';
    }
  }

  function showLoading(show, message = 'Memproses Data...') {
    const overlay = document.getElementById('loading-overlay');
    const msgEl = overlay.querySelector('p');
    if (msgEl) msgEl.textContent = message;
    overlay.classList.toggle('hidden', !show);
  }

  function showNotification(message, isError = false) {
    const container = document.getElementById('notification-container');
    const notification = document.createElement('div');
    const type = isError ? 'error' : 'success';
    const icon = type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill';
    const colorClass = type === 'success' ? 'bg-emerald-500 border-emerald-400 shadow-emerald-200' : 'bg-rose-500 border-rose-400 shadow-rose-200';
    
    notification.className = `${colorClass} text-white px-8 py-5 rounded-3xl shadow-2xl flex items-center gap-4 animate-slide-in border-b-4 relative overflow-hidden mb-4 pointer-events-auto`;
    notification.innerHTML = `
      <div class="absolute inset-0 bg-white/10 opacity-20 pointer-events-none"></div>
      <div class="relative z-10 w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center text-xl">
        <i class="bi ${icon}"></i>
      </div>
      <div class="relative z-10">
        <p class="text-[10px] font-black uppercase tracking-[0.2em] opacity-80 mb-0.5">${type === 'success' ? 'Berhasil' : 'Perhatian'}</p>
        <p class="font-black text-sm tracking-tight">${message}</p>
      </div>
    `;
    
    container.appendChild(notification);
    setTimeout(() => {
      notification.classList.add('animate-slide-out');
      setTimeout(() => notification.remove(), 500);
    }, 4500);
  }

  function showModal(id) {
    document.getElementById(`modal-${id}`).classList.remove('hidden');
  }

  function hideModal(id) {
    document.getElementById(`modal-${id}`).classList.add('hidden');
  }

  // Auth
  function handleLogin(e) {
    e.preventDefault();
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    const errDiv = document.getElementById('login-error');
    const errText = document.getElementById('login-error-text');
    const btn = document.getElementById('login-btn');
    
    errDiv.classList.add('hidden');
    btn.innerHTML = '<i class="bi bi-arrow-repeat animate-spin"></i> Memproses...';
    btn.disabled = true;

    google.script.run
      .withSuccessHandler(res => {
        btn.innerHTML = '<span>MASUK APLIKASI</span><i class="bi bi-arrow-right"></i>';
        btn.disabled = false;
        
        if (res.success) {
          appState.currentUser = res.user;
          appState.isAdmin = res.user.role === 'admin';
          try {
            localStorage.setItem('sipena_user', JSON.stringify(res.user));
          } catch (e) {
            console.error('Error saving session:', e);
          }
          
          // Smoother transition for GAS
          setTimeout(() => {
            showMainApp();
          }, 100);
        } else {
          errText.textContent = res.message;
          errDiv.classList.remove('hidden');
        }
      })
      .withFailureHandler(err => {
        btn.innerHTML = '<span>MASUK APLIKASI</span><i class="bi bi-arrow-right"></i>';
        btn.disabled = false;
        errText.textContent = 'Terjadi kesalahan koneksi.';
        errDiv.classList.remove('hidden');
      })
      .loginUser(u, p);
  }

  function handleLogout() {
    try {
      cleanupDashboard();
      localStorage.removeItem('sipena_user');
      appState.currentUser = null;
      appState.isAdmin = false;
      appState.records = null; // Clear records for security
      
      const loginScreen = document.getElementById('login-screen');
      const mainApp = document.getElementById('main-app');
      const content = document.getElementById('app-content');
      
      if (mainApp) {
        mainApp.classList.add('hidden');
        mainApp.style.display = 'none';
      }
      if (loginScreen) {
        loginScreen.classList.remove('hidden');
        loginScreen.style.display = 'flex';
      }
      if (content) content.innerHTML = '';
      
      // Close mobile sidebar if open
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      if (sidebar) sidebar.classList.add('-translate-x-full');
      if (overlay) overlay.classList.add('hidden');
      
      showNotification('Berhasil keluar sistem');
    } catch (e) {
      console.error('Logout error:', e);
      // Fallback redirect or reload
      window.location.reload();
    }
  }

  function showMainApp() {
    console.log('Showing main app interface...');
    const loginScreen = document.getElementById('login-screen');
    const mainApp = document.getElementById('main-app');
    
    // Safety check for user state
    if (!appState.currentUser) {
      console.warn('currentUser is null in showMainApp, redirecting to login.');
      showLogin();
      return;
    }

    // Unhide main containers
    if (loginScreen) {
      loginScreen.classList.add('hidden');
      loginScreen.style.display = 'none';
      loginScreen.style.zIndex = '-1';
    }
    
    if (mainApp) {
      mainApp.classList.remove('hidden');
      mainApp.style.display = 'flex';
      mainApp.style.visibility = 'visible';
      mainApp.style.opacity = '1';
    }

    // Refresh UI elements
    const initial = (appState.currentUser.username || 'U').charAt(0).toUpperCase();
    const avatar = document.getElementById('user-avatar');
    const nameDisplay = document.getElementById('user-name-display');
    const mobileNameDisplay = document.getElementById('mobile-user-name');
    
    if (avatar) avatar.textContent = initial;
    const name = appState.currentUser.puskesmasName || appState.currentUser.username;
    if (nameDisplay) nameDisplay.textContent = name;
    if (mobileNameDisplay) mobileNameDisplay.textContent = name;
    
    // Set initial view and fetch data
    navigate(appState.currentView || 'dashboard');
    fetchInitialData();
  }

  // Data Fetching
  function fetchInitialData() {
    const content = document.getElementById('app-content');
    if (!content.innerHTML || content.innerHTML.trim() === '') {
      showLoading(true);
    }
    
    google.script.run
      .withSuccessHandler(data => {
        appState.records = data || {};
        showLoading(false);
        
        // Update user name displays
        const name = appState.currentUser.puskesmasName || appState.currentUser.username;
        const nameDisp = document.getElementById('user-name-display');
        const mobileNameDisp = document.getElementById('mobile-user-name');
        if (nameDisp) nameDisp.textContent = name;
        if (mobileNameDisp) mobileNameDisp.textContent = name;

        renderDashboard(); // Always refresh dashboard on data arrival
      })
      .withFailureHandler(err => {
        console.error('Data fetch error:', err);
        showLoading(false);
        appState.records = appState.records || {};
        showNotification('Gagal mengambil data dari server. Silakan muat ulang.', true);
        renderDashboard();
      })
      .getAllDashboardData(appState.currentUser);
  }

  // Routing
  function navigate(view, editData = null) {
    try {
      cleanupDashboard();
      appState.currentView = view;
      appState.editingData = editData;
      window.scrollTo({ top: 0, behavior: 'smooth' });
      
      const content = document.getElementById('app-content');
      if (!content) return;
      
      content.innerHTML = '';
      
      // Update active state in sidebar
      const navLinks = document.querySelectorAll('.nav-link-custom');
      if (navLinks) {
        navLinks.forEach(link => {
          if (link.getAttribute('onclick') && link.getAttribute('onclick').includes(`'${view}'`)) {
            link.classList.add('active');
          } else {
            link.classList.remove('active');
          }
        });
      }
      
      if (view === 'dashboard') {
        renderDashboard();
      } else {
        renderForm(view);
      }
    } catch (e) {
      console.error('Navigation error:', e);
    }
  }

  // Dashboard Rendering
  function cleanupDashboard() {
    if (appState.sliderInterval) {
      clearInterval(appState.sliderInterval);
      appState.sliderInterval = null;
    }
    if (appState.clockInterval) {
      clearInterval(appState.clockInterval);
      appState.clockInterval = null;
    }
    // Destroy charts
    if (appState.charts) {
      Object.keys(appState.charts).forEach(key => {
        if (appState.charts[key]) {
          appState.charts[key].destroy();
          appState.charts[key] = null;
        }
      });
    } else {
      appState.charts = { pie: null, bar: null, line: null };
    }
  }

  const SLIDER_IMAGES = [
    { url: "https://i.ibb.co.com/S4Vg2Tf4/unnamed-5.jpg", title: "Child Health", desc: "Track, Analyze, and improve outcomes" },
    { url: "https://i.ibb.co.com/pj1gMW1g/Desain-tanpa-judul-6.png", title: "SI-PENA", desc: "Sistem Pelaporan Kesehatan Anak" },
    { url: "https://i.ibb.co.com/twq32zLZ/Gemini-Generated-Image-p2pquvp2pquvp2pq.jpg", title: "Digitalisasi Data Anak", desc: "Pelaporan Kesehatan yang Cepat, Akurat dan Transparan" }
  ];

  function renderDashboard() {
    try {
      cleanupDashboard();
      const content = document.getElementById('app-content');
      if (!content) return;

      if (!appState.currentUser) {
        handleLogout();
        return;
      }

      const records = appState.records;
      if (records === null) {
        content.innerHTML = `
          <div class="p-20 text-center animate-fade-in flex flex-col items-center justify-center min-h-[400px]">
            <div class="w-24 h-24 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mb-8 text-4xl animate-pulse">
              <i class="bi bi-cloud-download"></i>
            </div>
            <h3 class="text-3xl font-black text-slate-900 mb-3 tracking-tight">Menghubungkan ke Server</h3>
            <p class="text-slate-500 max-w-sm mx-auto font-medium mb-8">Mohon tunggu sebentar, SI-PENA sedang mengambil data terbaru untuk Anda.</p>
            <button onclick="fetchInitialData()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all flex items-center gap-2">
              <i class="bi bi-arrow-clockwise"></i> Ambil Ulang Data
            </button>
          </div>
        `;
        return;
      }
      
      // Filter records for current user
      let filteredRecords = {};
      
      Object.keys(records).forEach(key => {
        filteredRecords[key] = (records[key] || []).filter(r => {
          if (appState.isAdmin) return true;
          
          const rowPkmName = (r.Nama_Puskesmas || r['Nama Puskesmas'] || '').toString().toLowerCase().trim();
          const rowPkmId = (r.Id_Puskesmas || r.ID_Puskesmas || '').toString().trim();
          const userPkmName = (appState.currentUser.puskesmasName || '').toLowerCase().trim();
          const userPkmId = (appState.currentUser.puskesmasId || '').trim();
          
          return (userPkmId && rowPkmId === userPkmId) || (userPkmName && rowPkmName === userPkmName);
        });
      });

    // Calculate stats
    let totalValid = 0;
    let totalReports = 0;
    let needsRevision = [];
    let incomingReports = [];
    let allReports = [];

    const monthlyStats = Array(12).fill(0);
    const deathTrends = Array(12).fill(0).map(() => ({ neonatal: 0, balita: 0 }));
    const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

    Object.keys(filteredRecords).forEach(key => {
      const list = filteredRecords[key] || [];
      list.forEach(r => {
        totalReports++;
        if (r.Status_Validasi === 'Valid') totalValid++;
        
        r._type = key;
        allReports.push(r);
        if (r.Status_Validasi === 'Belum Valid') needsRevision.push(r);
        if (r.Status_Validasi === 'Terkirim') incomingReports.push(r);

        // Use flexible key lookup for month/year
        const monthStr = (r.Bulan || r.bulan || r.MONTH || '').toString().trim();
        const mIdx = months.findIndex(m => m.toLowerCase() === monthStr.toLowerCase());
        if (mIdx !== -1) {
          monthlyStats[mIdx]++;
          if (key === 'kematianNeonatal') {
            deathTrends[mIdx].neonatal += (Number(r.Jumlah_Kematian_Neonatal) || 0);
          }
          if (key === 'kematianBalita') {
            deathTrends[mIdx].balita += (Number(r.Kematian_Balita_0_59_Bln) || 0);
          }
        }
      });
    });

    const validPercentage = totalReports > 0 ? Math.round((totalValid / totalReports) * 100) : 0;

    let html = `
      <div class="space-y-12 pb-12">
        <!-- Hero Slider Section -->
        <section class="relative h-[350px] md:h-[500px] rounded-3xl overflow-hidden shadow-2xl bg-slate-900" id="hero-slider">
          ${SLIDER_IMAGES.map((img, idx) => `
            <div class="absolute inset-0 transition-opacity duration-1000 ease-in-out ${idx === 0 ? 'opacity-100' : 'opacity-0'}" id="slide-${idx}">
              <img src="${img.url}" class="w-full h-full object-cover object-center" alt="Hero">
              <div class="absolute inset-0 bg-black/40 hero-gradient-overlay flex flex-col items-center justify-center text-center p-6">
                <h2 class="text-white text-3xl md:text-6xl font-extrabold mb-4 animate-fade-in-up drop-shadow-lg">${img.title}</h2>
                <p class="text-slate-100 text-lg md:text-2xl font-medium max-w-2xl drop-shadow-md">${img.desc}</p>
              </div>
            </div>
          `).join('')}
          
          <!-- Floating Greeting & Clock Widget -->
          <div class="absolute bottom-6 left-6 right-6 flex flex-col md:flex-row justify-between items-end md:items-center bg-white/10 backdrop-blur-md border border-white/20 p-6 rounded-2xl">
            <div>
              <h3 class="text-white text-2xl font-bold flex items-center gap-2" id="greeting-text">
                Selamat Datang, ${appState.currentUser.puskesmasName || appState.currentUser.username}
              </h3>
              <p class="text-slate-200 font-medium" id="date-text"></p>
            </div>
            <div class="text-white text-5xl font-mono font-bold tracking-widest mt-4 md:mt-0" id="clock-text"></div>
          </div>
        </section>

        <!-- Monitoring Overview (Stat Cards) -->
        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 animate-fade-in-up">
          <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-md transition-all">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-indigo-500 text-white rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-indigo-100 dark:shadow-none">
                <i class="bi bi-files"></i>
              </div>
              <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-tight">Total Laporan</p>
                <h4 class="text-2xl font-black text-slate-800 dark:text-slate-100">${totalReports}</h4>
              </div>
            </div>
          </div>
          
          <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-md transition-all">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-emerald-500 text-white rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-emerald-100 dark:shadow-none">
                <i class="bi bi-check-circle"></i>
              </div>
              <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-tight">Rate Validasi</p>
                <h4 class="text-2xl font-black text-slate-800 dark:text-slate-100">${validPercentage}%</h4>
              </div>
            </div>
          </div>

          <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-md transition-all">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-amber-500 text-white rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-amber-100 dark:shadow-none">
                <i class="bi bi-clock-history"></i>
              </div>
              <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-tight">Data Terkirim</p>
                <h4 class="text-2xl font-black text-slate-800 dark:text-slate-100">${incomingReports.length}</h4>
              </div>
            </div>
          </div>

          <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-md transition-all">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 bg-rose-500 text-white rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-rose-100 dark:shadow-none">
                <i class="bi bi-exclamation-triangle"></i>
              </div>
              <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-tight">Perlu Perbaikan</p>
                <h4 class="text-2xl font-black text-slate-800 dark:text-slate-100">${needsRevision.length}</h4>
              </div>
            </div>
          </div>
        </section>

        <!-- Revision Table -->
        ${needsRevision.length > 0 ? `
        <section class="animate-fade-in">
          <div class="bg-rose-50 dark:bg-rose-900/10 p-8 rounded-[3rem] border-2 border-rose-100 dark:border-rose-900/30">
            <div class="flex items-center gap-3 mb-6">
              <div class="w-10 h-10 bg-rose-500 text-white rounded-xl flex items-center justify-center text-lg shadow-lg shadow-rose-200">
                <i class="bi bi-tools"></i>
              </div>
              <div>
                <h3 class="text-xs font-black text-slate-800 dark:text-slate-200 uppercase tracking-widest">Laporan Perlu Perbaikan</h3>
                <p class="text-[10px] text-rose-500 font-bold uppercase tracking-widest">Segera perbaiki data berikut sesuai catatan admin</p>
              </div>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-left border-separate border-spacing-y-4">
                <thead>
                  <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-6">
                    <th class="pb-2">Formulir</th>
                    <th class="pb-2">Periode</th>
                    <th class="pb-2">Catatan Admin</th>
                    <th class="pb-2 text-right">Aksi</th>
                  </tr>
                </thead>
                <tbody>
                  ${needsRevision.map(r => `
                    <tr class="bg-white dark:bg-slate-800 rounded-3xl shadow-sm hover:shadow-md transition-all group">
                      <td class="py-5 px-6 rounded-l-3xl border-y-2 border-l-2 border-themed font-black text-slate-800 dark:text-slate-200 text-sm">
                        ${FORM_DEFINITIONS[r._type]?.label || r._type}
                      </td>
                      <td class="py-5 px-6 border-y-2 border-themed text-slate-600 dark:text-slate-400 font-bold text-sm">
                        ${r.Bulan} ${r.Tahun}
                      </td>
                      <td class="py-5 px-6 border-y-2 border-themed text-rose-600 dark:text-rose-400 text-xs italic font-bold">
                        ${r.Catatan_Validasi || 'Tidak ada catatan khusus.'}
                      </td>
                      <td class="py-5 px-6 rounded-r-3xl border-y-2 border-r-2 border-themed text-right">

  function setupFormCalculations(formId) {
    const form = document.getElementById('data-form');
    if (!form) return;

    const getVal = (name) => {
      const el = form.elements[name];
      if (!el) return 0;
      return el.value ? parseFloat(el.value) || 0 : 0;
    };

    const setVal = (name, val) => {
      const el = form.elements[name];
      if (el) {
        if (val === 0 || (val && !isNaN(val))) {
          el.value = Number.isInteger(val) ? val : parseFloat(val.toFixed(2));
        } else {
          el.value = '';
        }
      }
    };

    form.addEventListener('input', (e) => {
      try {
        if (formId === 'kegiatan') {
          const sPusdatin = getVal('Sasaran_Lahir_Hidup_Pusdatin');
          const sSpm = getVal('Sasaran_Lahir_Hidup_SPM_PKM');

          // Sasaran Komplikasi Neonatus
          const sNeoKompPusdatin = sPusdatin * 0.15;
          const sNeoKompSpm = sSpm * 0.15;
          setVal('Sasaran_Neonatus_Komplikasi', sNeoKompPusdatin);
          setVal('Sasaran_Komplikasi_Neonatus_SPM', sNeoKompSpm);

          // KN 1
          const kn1L = getVal('KN1_L');
          const kn1P = getVal('KN1_P');
          const kn1Total = kn1L + kn1P;
          setVal('KN1_Jml', kn1Total);
          setVal('KN1_Abs', kn1Total);
          setVal('KN1_Persen_Pusdatin', sPusdatin ? (kn1Total / sPusdatin) * 100 : 0);
          setVal('KN1_Persen_SPM', sSpm ? (kn1Total / sSpm) * 100 : 0);

          // KN LENGKAP
          const knL_L = getVal('KN_Lengkap_L');
          const knL_P = getVal('KN_Lengkap_P');
          const knL_Total = knL_L + knL_P;
          setVal('KN_Lengkap_Jml', knL_Total);
          setVal('KN_Lengkap_Abs', knL_Total);
          setVal('KN_Lengkap_Persen_Pusdatin', sPusdatin ? (knL_Total / sPusdatin) * 100 : 0);
          setVal('KN_Lengkap_Persen_SPM', sSpm ? (knL_Total / sSpm) * 100 : 0);

          // Neonatus Komplikasi Ditangani
          const neoKompL = getVal('Neonatus_Komplikasi_Ditangani_L');
          const neoKompP = getVal('Neonatus_Komplikasi_Ditangani_P');
          const neoKompTotal = neoKompL + neoKompP;
          setVal('Neonatus_Komplikasi_Ditangani_Jml', neoKompTotal);
          setVal('Neonatus_Komplikasi_Ditangani_Abs', neoKompTotal);
          setVal('Neonatus_Komplikasi_Ditangani_Persen_Pusdatin', sNeoKompPusdatin ? (neoKompTotal / sNeoKompPusdatin) * 100 : 0);
          setVal('Neonatus_Komplikasi_Ditangani_Persen_SPM', sNeoKompSpm ? (neoKompTotal / sNeoKompSpm) * 100 : 0);

          // Kunjungan Bayi
          const bayL = getVal('Kunjungan_Bayi_L');
          const bayP = getVal('Kunjungan_Bayi_P');
          const bayTotal = bayL + bayP;
          setVal('Kunjungan_Bayi_Jml', bayTotal);
          setVal('Kunjungan_Bayi_Abs', bayTotal);
          setVal('Kunjungan_Bayi_Persen_Pusdatin', sPusdatin ? (bayTotal / sPusdatin) * 100 : 0);
          setVal('Kunjungan_Bayi_Persen_SPM', sSpm ? (bayTotal / sSpm) * 100 : 0);

          // Pelayanan Kesehatan Balita
          const sBalitaPusdatin = getVal('Sasaran_Anak_Balita_0_4_Th_Pusdatin');
          const sBalitaSpm = getVal('Sasaran_Balita_SPM');
          const balitaL = getVal('Pelayanan_Kesehatan_Balita_L');
          const balitaP = getVal('Pelayanan_Kesehatan_Balita_P');
          const balitaTotal = balitaL + balitaP;
          setVal('Pelayanan_Kesehatan_Balita_Jml', balitaTotal);
          setVal('Pelayanan_Kesehatan_Balita_Abs', balitaTotal);
          setVal('Pelayanan_Kesehatan_Balita_Persen_Pusdatin', sBalitaPusdatin ? (balitaTotal / sBalitaPusdatin) * 100 : 0);
          setVal('Pelayanan_Kesehatan_Balita_Persen_SPM', sBalitaSpm ? (balitaTotal / sBalitaSpm) * 100 : 0);
          
          setVal('Indikator_SPM_Pelayanan_Kesehatan_Balita_Abs', balitaTotal);
          setVal('Indikator_SPM_Pelayanan_Kesehatan_Balita_Persen', sBalitaSpm ? (balitaTotal / sBalitaSpm) * 100 : 0);
        }
        else if (formId === 'rpjmn') {
          const sLHPusdatin = getVal('Sasaran_Lahir_Hidup_Pusdatin');
          const sBalitaPusdatin = getVal('Sasaran_Balita_Pusdatin');
          const sBalitaSpm = getVal('Sasaran_Balita_SPM_Kab_Minsel_0_4_Th');
          const pkmJml = getVal('Jumlah_Puskesmas');

          setVal('KN_Lengkap_Persen', sLHPusdatin ? (getVal('KN_Lengkap_Abs') / sLHPusdatin) * 100 : 0);
          setVal('Balita_Dipantau_Tumbuh_Kembang_Persen_Pusdatin', sBalitaPusdatin ? (getVal('Balita_Dipantau_Tumbuh_Kembang_Abs') / sBalitaPusdatin) * 100 : 0);
          setVal('Balita_Dipantau_Tumbuh_Kembang_Persen_SPM_Kab', sBalitaSpm ? (getVal('Balita_Dipantau_Tumbuh_Kembang_Abs') / sBalitaSpm) * 100 : 0);
          
          setVal('Jumlah_Balita_Berobat_Persen_Pusdatin', sBalitaPusdatin ? (getVal('Jumlah_Balita_Berobat_Abs') / sBalitaPusdatin) * 100 : 0);
          setVal('Jumlah_Balita_Berobat_Persen_SPM_Kab', sBalitaSpm ? (getVal('Jumlah_Balita_Berobat_Abs') / sBalitaSpm) * 100 : 0);
          
          setVal('Jumlah_Balita_MTBS_Persen_Pusdatin', getVal('Jumlah_Balita_Berobat_Abs') ? (getVal('Jumlah_Balita_MTBS_Abs') / getVal('Jumlah_Balita_Berobat_Abs')) * 100 : 0);
          
          setVal('Jumlah_Balita_SDIDTK_Persen_Pusdatin', sBalitaPusdatin ? (getVal('Jumlah_Balita_SDIDTK_Abs') / sBalitaPusdatin) * 100 : 0);
          setVal('Jumlah_Balita_SDIDTK_Persen_SPM_Kab', sBalitaSpm ? (getVal('Jumlah_Balita_SDIDTK_Abs') / sBalitaSpm) * 100 : 0);
          
          setVal('Puskesmas_Kelas_Ibu_Balita_50_Persen_Desa_Persen', pkmJml ? (getVal('Puskesmas_Kelas_Ibu_Balita_50_Persen_Desa_Abs') / pkmJml) * 100 : 0);
          setVal('Puskesmas_Melaksanakan_MTBS_Persen', pkmJml ? (getVal('Puskesmas_Melaksanakan_MTBS_Abs') / pkmJml) * 100 : 0);
          setVal('Puskesmas_Melaksanakan_SDIDTK_Persen', pkmJml ? (getVal('Puskesmas_Melaksanakan_SDIDTK_Abs') / pkmJml) * 100 : 0);
        }
        else if (formId === 'kelasBalita') {
          const k01 = getVal('Kelas_0_1_Tahun');
          const k12 = getVal('Kelas_1_2_Tahun');
          const k25 = getVal('Kelas_2_5_Tahun');
          setVal('Jumlah_Kelas_Ibu_Balita', k01 + k12 + k25);
        }
        else if (formId === 'kelasBalitaKabKota') {
           const jmlDesa = getVal('Jumlah_Desa_Kelurahan');
           const desaLaks = getVal('Desa_Dengan_Kelas_Ibu_Balita_Abs');
           setVal('Desa_Dengan_Kelas_Ibu_Balita_Persen', jmlDesa ? (desaLaks / jmlDesa) * 100 : 0);
           setVal('Persen_Desa_Melaksanakan_KLS_Ibu_Balita', pkmJml ? (getVal('Puskesmas_Melaksanakan_Kelas_Ibu_Balita_di_50_Persen_Desa_Kelurahan') / pkmJml) * 100 : 0);
        }
        else if (formId === 'kematianNeonatal') {
          const lH_L = getVal('Lahir_Hidup_Absolut_L');
          const lH_P = getVal('Lahir_Hidup_Absolut_P');
          setVal('Lahir_Hidup_Total', lH_L + lH_P);
          
          const n06 = getVal('Kematian_0_6_Hari');
          const n728 = getVal('Kematian_7_28_Hari');
          setVal('Jumlah_Kematian_Neonatal', n06 + n728);
        }
        else if (formId === 'kematianBalita') {
          const neo = getVal('Jumlah_Kematian_Neonatal'); 
          const postNeo = getVal('Kematian_Post_Neonatal_29Hr_11Bln');
          const bayi011 = neo + postNeo;
          setVal('Kematian_Bayi_0_11_Bln', bayi011);

          const anak1259 = getVal('Kematian_Anak_Balita_12_59_Bln');
          setVal('Kematian_Balita_0_59_Bln', bayi011 + anak1259);
        }
      } catch (err) {
        console.warn('Calculation failed:', err);
      }
    });
  }

  function renderValidationChart(data) {
    const canvas = document.getElementById('validationChart');
    const pctEl = document.getElementById('donut-percentage');
    if (!canvas) return;
    
    let valid = 0, proses = 0;
    Object.keys(data).forEach(k => {
      data[k].forEach(r => {
        if (r.Status_Validasi === 'Valid') {
          valid++;
        } else {
          proses++;
        }
      });
    });

    const total = valid + proses;
    const validPct = total > 0 ? Math.round((valid / total) * 100) : 0;
    if (pctEl) pctEl.textContent = `${validPct}%`;

    const isDark = document.documentElement.classList.contains('dark');
    const textColor = isDark ? '#94a3b8' : '#64748b';

    if (appState.charts.pie) appState.charts.pie.destroy();
    appState.charts.pie = new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels: ['Valid', 'Proses'],
        datasets: [{
          data: [valid, proses],
          backgroundColor: ['#10b981', isDark ? '#334155' : '#cbd5e1'],
          borderWidth: 0,
          cutout: '75%'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: false
          }
        }
      }
    });
  }

  function renderStatsChart(data) {
    const canvas = document.getElementById('statsChart');
    if (!canvas) return;

    const isDark = document.documentElement.classList.contains('dark');
    const textColor = isDark ? '#94a3b8' : '#64748b';
    const gridColor = isDark ? '#334155' : '#e2e8f0';

    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
    const monthlyData = Array(12).fill(0);
    
    Object.keys(data).forEach(k => {
      data[k].forEach(r => {
        const m = (r.Bulan || '').toLowerCase().trim();
        const idx = ['januari','februari','maret','april','mei','juni','juli','agustus','september','oktober','november','desember'].indexOf(m);
        if (idx !== -1) monthlyData[idx]++;
      });
    });

    if (appState.charts.bar) appState.charts.bar.destroy();
    appState.charts.bar = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: months,
        datasets: [{
          label: 'Total Laporan',
          data: monthlyData,
          backgroundColor: '#6366f1',
          borderRadius: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { 
            beginAtZero: true, 
            grid: { color: gridColor, borderDash: [5, 5] },
            ticks: { color: textColor, font: { weight: 'bold' } }
          },
          x: { 
            grid: { display: false },
            ticks: { color: textColor, font: { weight: 'bold' } }
          }
        }
      }
    });
  }

  function renderDeathChart(data) {
    const canvas = document.getElementById('deathChart');
    if (!canvas) return;

    const isDark = document.documentElement.classList.contains('dark');
    const textColor = isDark ? '#94a3b8' : '#64748b';
    const gridColor = isDark ? '#334155' : '#e2e8f0';

    const monthsArr = ['januari','februari','maret','april','mei','juni','juli','agustus','september','oktober','november','desember'];
    const neoDeaths = Array(12).fill(0);
    const balitaDeaths = Array(12).fill(0);
    
    if (data.kematianNeonatal) {
      data.kematianNeonatal.forEach(r => {
        const m = (r.Bulan || '').toLowerCase().trim();
        const idx = monthsArr.indexOf(m);
        if (idx !== -1) neoDeaths[idx] += (Number(r.Jumlah_Kematian_Neonatal) || 0);
      });
    }

    if (data.kematianBalita) {
      data.kematianBalita.forEach(r => {
        const m = (r.Bulan || '').toLowerCase().trim();
        const idx = monthsArr.indexOf(m);
        if (idx !== -1) balitaDeaths[idx] += (Number(r.Kematian_Balita_0_59_Bln) || 0);
      });
    }

    if (appState.charts.line) appState.charts.line.destroy();
    appState.charts.line = new Chart(canvas, {
      type: 'line',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'],
        datasets: [
          {
            label: 'Neonatal',
            data: neoDeaths,
            borderColor: '#f43f5e',
            backgroundColor: '#f43f5e',
            pointBackgroundColor: '#f43f5e',
            tension: 0.4,
            borderWidth: 3,
            fill: false
          },
          {
            label: 'Balita',
            data: balitaDeaths,
            borderColor: '#fbbf24',
            backgroundColor: '#fbbf24',
            pointBackgroundColor: '#fbbf24',
            tension: 0.4,
            borderWidth: 3,
            fill: false
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }
        },
        scales: {
          y: { 
            beginAtZero: true, 
            grid: { color: gridColor, borderDash: [5, 5] },
            ticks: { color: textColor, font: { weight: 'bold' } }
          },
          x: { 
            grid: { color: gridColor, borderDash: [5, 5] },
            ticks: { color: textColor, font: { weight: 'bold' } }
          }
        }
      }
    });
  }

          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500 transition-colors">

          </div>
          <select name="${name}" required 
            class="form-select rounded-2xl py-3.5 pl-11 pr-4 w-full border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-indigo-500 hover:border-slate-300 dark:hover:border-slate-600 transition-all text-sm font-black outline-none appearance-none text-slate-800 dark:text-white focus:shadow-lg focus:shadow-indigo-100 dark:focus:shadow-none">

  function populateFormData() {
    const form = document.getElementById('data-form');
    if (!form) return;

    // Default values
    const now = new Date();
    const localDate = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
    
    const defaults = {
      Nama_Petugas_Penginput: '',
      Tanggal_Input: localDate,
      Nama_Puskesmas: appState.isAdmin ? '' : appState.currentUser.puskesmasName,
      Id_Puskesmas: appState.isAdmin ? '' : appState.currentUser.puskesmasId
    };

    const data = appState.editingData || defaults;

    // Ensure fundamental identity fields exist in form
    ['Id_Puskesmas', 'Nama_Puskesmas', 'Status_Validasi'].forEach(field => {
       if (!form.elements[field]) {
         const hidden = document.createElement('input');
         hidden.type = 'hidden';
         hidden.name = field;
         form.appendChild(hidden);
       }
    });

    Object.keys(data).forEach(key => {
      const input = form.elements[key];
      if (input) {
        input.value = data[key];
      }
    });

    if (!appState.isAdmin && appState.editingData) {
      const statusDisp = document.getElementById('status-display');
      const catDisp = document.getElementById('catatan-display');
      const statusDot = document.getElementById('status-dot');
      
      const status = data.Status_Validasi || 'Draft';
      if (statusDisp) statusDisp.textContent = status;
      
      if (statusDot) {
        statusDot.className = 'w-3 h-3 rounded-full ' + (
          status === 'Valid' ? 'bg-emerald-500' :
          status === 'Belum Valid' ? 'bg-rose-500' :
          status === 'Terkirim' ? 'bg-blue-500' : 'bg-slate-400'
        );
      }

      if (catDisp && data.Catatan_Validasi) {
        catDisp.textContent = `Pesan Admin: "${data.Catatan_Validasi}"`;
        catDisp.classList.remove('hidden');
      }
    }
    
    // Add Id_Data hidden field if editing
    if (appState.editingData && appState.editingData.Id_Data) {
      const hiddenId = document.createElement('input');
      hiddenId.type = 'hidden';
      hiddenId.name = 'Id_Data';
      hiddenId.value = appState.editingData.Id_Data;
      form.appendChild(hiddenId);
    }
  }

  function submitForm(e, formId) {
    if (e) e.preventDefault();
    
    const form = document.getElementById('data-form');
    if (!form) return;

    // Reset previous validation errors
    const errorMsgs = form.querySelectorAll('.error-message');
    errorMsgs.forEach(msg => msg.remove());
    const errorInputs = form.querySelectorAll('.border-rose-500, .animate-shake');
    errorInputs.forEach(input => {
      input.classList.remove('border-rose-500', 'animate-shake', 'ring-rose-500/20', 'ring-4');
    });

    // Manual Validation
    const requiredInputs = form.querySelectorAll('[required]');
    let hasError = false;
    let firstErrorElement = null;

    requiredInputs.forEach(input => {
      const isEmpty = !input.value || input.value.trim() === '';
      
      if (isEmpty) {
        hasError = true;
        input.classList.add('border-rose-500', 'animate-shake', 'ring-rose-500/20', 'ring-4');
        
        if (!firstErrorElement) firstErrorElement = input;
        
        // Remove error on input
        input.addEventListener('input', () => {
          input.classList.remove('border-rose-500', 'animate-shake', 'ring-rose-500/20', 'ring-4');
        }, { once: true });
      }
    });

    if (hasError) {
      showNotification('Harap lengkapi semua kolom wajib bertanda bintang (*)', true);
      if (firstErrorElement) {
        firstErrorElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
        firstErrorElement.focus();
      }
      return;
    }

    showLoading(true);
    const formData = new FormData(form);
    const dataObj = {};
    
    formData.forEach((value, key) => {
      // Convert numbers
      if (value !== '' && !isNaN(value) && 
          key !== 'Id_Puskesmas' && 
          key !== 'Nama_Puskesmas' && 
          key !== 'Bulan' && 
          key !== 'Tahun' &&
          key !== 'Nama_Petugas_Penginput') {
        dataObj[key] = Number(value);
      } else {
        dataObj[key] = value;
      }
    });

    // Ensure Puskesmas identity is injected correctly
    if (!appState.isAdmin && appState.currentUser) {
      dataObj['Id_Puskesmas'] = appState.currentUser.puskesmasId;
      dataObj['Nama_Puskesmas'] = appState.currentUser.puskesmasName;
    }

    // Force status for non-admins
    if (!appState.isAdmin) {
      dataObj['Status_Validasi'] = 'Terkirim';
    }

    // Map sheet name
    let sheetName = FORMS.find(f => f.id === formId).label.replace(/ /g, '_');
    if (formId === 'users') sheetName = 'Users';
    if (formId === 'sasaran') sheetName = 'Sasaran';
    if (formId === 'kegiatan') sheetName = 'Kegiatan';
    if (formId === 'rpjmn') sheetName = 'RPJMN';
    if (formId === 'kelasBalita') sheetName = 'Kelas_Balita';
    if (formId === 'kelasBalitaKabKota') sheetName = 'Kelas_Balita_KabKota';
    if (formId === 'kematianNeonatal') sheetName = 'Kematian_Neonatal';
    if (formId === 'kematianBalita') sheetName = 'Kematian_Balita';

    google.script.run
      .withSuccessHandler(res => {
        if (res.success) {
          showNotification('Data Berhasil Terkirim!');
          appState.currentView = 'dashboard';
          fetchInitialData();
        } else {
          showLoading(false);
          showNotification(res.message, true);
        }
      })
      .withFailureHandler(err => {
        showLoading(false);
        showNotification('Gagal menyimpan data', true);
      })
      .submitData(sheetName, dataObj, appState.currentUser);
  }

  function deleteData(formId, idData) {
    if (!confirm('Apakah Anda yakin ingin menghapus data ini?')) return;
    
    showLoading(true);
    
    // Map sheet name
    let sheetName = FORMS.find(f => f.id === formId).label.replace(/ /g, '_');
    if (formId === 'users') sheetName = 'Users';
    if (formId === 'sasaran') sheetName = 'Sasaran';
    if (formId === 'kegiatan') sheetName = 'Kegiatan';
    if (formId === 'rpjmn') sheetName = 'RPJMN';
    if (formId === 'kelasBalita') sheetName = 'Kelas_Balita';
    if (formId === 'kelasBalitaKabKota') sheetName = 'Kelas_Balita_KabKota';
    if (formId === 'kematianNeonatal') sheetName = 'Kematian_Neonatal';
    if (formId === 'kematianBalita') sheetName = 'Kematian_Balita';

    google.script.run
      .withSuccessHandler(res => {
        if (res.success) {
          showNotification('Data berhasil dihapus');
          fetchInitialData(); // Refresh dashboard
        } else {
          showLoading(false);
          showNotification(res.message, true);
        }
      })
      .withFailureHandler(err => {
        showLoading(false);
        showNotification('Gagal menghapus data', true);
      })
      .deleteData(sheetName, idData, appState.currentUser);
  }

  function editReport(type, id) {
    if (!appState.records || !appState.records[type]) return;
    const record = appState.records[type].find(r => r.Id_Data == id);
    if (record) {
      navigate(type, record);
    } else {
      showNotification('Laporan tidak ditemukan', true);
    }
  }
</script>
