<style>
  /* Variable Setup */
  :root {
    --bg-main: #f8fafc;
    --bg-card: #ffffff;
    --bg-sidebar: #ffffff;
    --bg-input: #f8fafc;
    --text-primary: #0f172a;
    --text-secondary: #334155;
    --border-base: #cbd5e1;
    --border-hover: #94a3b8;
    --nav-hover: #f1f5f9;
    --indigo: #4f46e5;
    --emerald: #10b981;
    --rose: #f43f5e;
  }

  /* Dark Mode Class */
  html.dark {
    --bg-main: #0f172a;
    --bg-card: #1e293b;
    --bg-sidebar: #1e293b;
    --bg-input: #1e293b;
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --border-base: #64748b;
    --border-hover: #94a3b8;
    --nav-hover: #334155;
    color-scheme: dark;
  }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    width: 100%;
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-main);
    color: var(--text-primary);
  }
  
  /* Custom Navigation Links */
  .nav-link-custom {
    color: var(--text-secondary);
    font-weight: 800;
    padding: 0.75rem 1.25rem;
    border-radius: 1rem;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    border: 1px solid transparent;
  }
  .nav-link-custom:hover {
    background-color: var(--nav-hover);
    color: var(--indigo);
    border-color: var(--border-hover);
    transform: translateY(-2px);
  }
  .nav-link-custom.active {
    background-color: var(--indigo);
    color: #ffffff;
    box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2);
  }
  
  /* Glassmorphism Header */
  .glass-header {
    background: var(--bg-sidebar);
    opacity: 0.98;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 2px solid var(--border-base);
    z-index: 1000;
  }
  
  /* Sidebar */
  #sidebar {
    background-color: var(--bg-sidebar);
    border-right: 1px solid var(--border-base);
  }

  /* Cards & Sections */
  .card-styled {
    background-color: var(--bg-card);
    border: 1px solid var(--border-base);
    border-radius: 1.5rem;
  }

  /* Form Cards */
  .form-card {
    background-color: var(--bg-card);
    border-radius: 1.5rem;
    border: 1px solid var(--border-base);
    transition: all 0.3s ease;
  }
  .form-card:hover {
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    transform: translateY(-4px);
    border-color: var(--border-hover);
  }
  
  /* Inputs */
  .form-control, .form-select {
    background-color: var(--bg-input);
    color: var(--text-primary);
    border: 2px solid var(--border-base);
    outline: none;
    box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  }
  .form-control:focus, .form-select:focus {
    background-color: var(--bg-card);
    border-color: var(--indigo);
    box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
  }
  .form-control::placeholder {
    color: var(--text-secondary);
    opacity: 0.5;
  }
  
  /* Native Date Picker Dark Mode */
  html.dark input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
  }
  html.dark .form-control, html.dark .form-select {
    color: #ffffff;
    border-color: #334155;
    background-color: #1e293b;
  }
  html.dark .form-control:focus, html.dark .form-select:focus {
    border-color: var(--indigo);
    background-color: #0f172a;
  }

  /* Validation Error Styling */
  .field-error {
    border-color: var(--rose) !important;
    background-color: #fff1f2 !important;
  }
  html.dark .field-error {
    background-color: #451a1a !important;
    border-color: #f43f5e !important;
  }
  .error-message {
    color: var(--rose);
    font-size: 0.7rem;
    font-weight: 700;
    margin-top: 0.25rem;
    margin-left: 0.5rem;
    display: block;
    animation: fadeIn 0.3s ease;
  }
  
  /* Tables */
  .table-container {
    background-color: var(--bg-card);
  }
  .table-header {
    background-color: var(--bg-input);
    color: var(--text-secondary);
  }
  .table-row:hover {
    background-color: var(--nav-hover);
  }

  /* Theme Helper Classes */
  .bg-card-themed { background-color: var(--bg-card); }
  .bg-main-themed { background-color: var(--bg-main); }
  .text-primary-themed { color: var(--text-primary); }
  .text-secondary-themed { color: var(--text-secondary); }
  .border-themed { border-color: var(--border-base); }

  /* Hero Overlay */
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(100%); }
    to { opacity: 1; transform: translateX(0); }
  }
  .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
  .animate-fade-in-up { animation: fadeInUp 0.7s ease-out forwards; }
  .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
  
  /* WhatsApp Float */
  .wa-float {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 60px;
    height: 60px;
    background-color: #25d366;
    color: #fff;
    border-radius: 50px;
    text-align: center;
    font-size: 30px;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }
  .wa-float:hover {
    transform: scale(1.1);
    background-color: #1ebe57;
    color: white;
  }
  
  /* Loading Overlay */
  #loading-overlay {
    background-color: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    transition: all 0.4s ease;
    display: flex; /* Ensure flex if not hidden */
  }
  html.dark #loading-overlay {
    background-color: rgba(15, 23, 42, 0.9);
    color: #f8fafc;
  }
  #loading-overlay.hidden { display: none !important; }
  
  #loading-overlay .spinner {
    width: 64px;
    height: 64px;
    border: 6px solid #e2e8f0;
    border-top: 6px solid #10b981;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  /* Hide elements */
  .hidden { display: none; }
  @keyframes slide-out {
    from { transform: translateX(0); opacity: 1; }
    to { transform: translateX(100%); opacity: 0; }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
    20%, 40%, 60%, 80% { transform: translateX(4px); }
  }
  .animate-slide-out { animation: slide-out 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
  
  /* Additional accessibility and visibility improvements */
  .dark input, .dark select {
    color-scheme: dark;
  }
  
  .field-error {
    border-color: #f43f5e !important;
    animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
  }
</style>
