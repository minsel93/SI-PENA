<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SI-PENA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
      body { font-family: 'Inter', sans-serif; }
      .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
      .nav-link-custom { padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600; color: #475569; transition: all 0.2s; }
      .nav-link-custom:hover { background: #f1f5f9; color: #0f172a; }
      .wa-float { position: fixed; bottom: 2rem; right: 2rem; background: #25d366; color: white; width: 3.5rem; height: 3.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); z-index: 1000; transition: transform 0.2s; }
      .wa-float:hover { transform: scale(1.1); }
      .animate-fade-in { animation: fadeIn 0.3s ease-out; }
      .animate-slide-in { animation: slideIn 0.3s ease-out; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
