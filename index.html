<!DOCTYPE html>
<html lang="id" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SI-PENA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
      
      :root {
        color-scheme: dark;
      }

      body { 
        font-family: 'Inter', sans-serif; 
        @apply bg-slate-950 text-slate-200;
      }

      .dark body {
        background-color: #020617;
        color: #e2e8f0;
      }

      .glass-header { 
        background: rgba(15, 23, 42, 0.8); 
        backdrop-filter: blur(12px); 
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .nav-link-custom { 
        padding: 0.5rem 1rem; 
        border-radius: 0.75rem; 
        font-weight: 600; 
        color: #94a3b8; 
        transition: all 0.2s; 
      }
      
      .nav-link-custom:hover { 
        background: rgba(255, 255, 255, 0.05); 
        color: #f8fafc; 
      }

      .form-card {
        @apply bg-slate-900 border border-slate-800 rounded-[2rem] p-6 transition-all hover:bg-slate-800/80 hover:border-emerald-500/30 hover:shadow-2xl hover:shadow-emerald-500/10;
      }

      .wa-float { position: fixed; bottom: 2rem; right: 2rem; background: #22c55e; color: white; width: 3.5rem; height: 3.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); z-index: 1000; transition: all 0.3s; }
      .wa-float:hover { transform: scale(1.1) translateY(-5px); background: #16a34a; }
      
      .animate-fade-in { animation: fadeIn 0.4s ease-out; }
      .animate-slide-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
      
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #020617; }
      ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #334155; }

      /* Form Controls Dark Mode */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        opacity: 1;
      }

      .modal-content-custom {
        border-radius: 2.5rem;
        background: #0f172a;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              // Custom colors if needed
            }
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
